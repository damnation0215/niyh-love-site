<!DOCTYPE html>
<html>
<head>
<title>For Niyh ❤️</title>

<style>

body {
    text-align: center;
    font-family: Arial;
    margin-top: 100px;
    background: linear-gradient(to right, #ffccd5, #ffc2d1);
    overflow: hidden;
}

h1 {
    font-size: 40px;
    color: #ff4d6d;
}

button {
    font-size: 20px;
    padding: 10px 20px;
    margin: 10px;
    position: absolute;
    border-radius: 10px;
    border: none;
}

#yesBtn {
    position: static;
    background-color: #ff4d6d;
    color: white;
}

#noBtn {
    background-color: gray;
    color: white;
}

.loveText {
    font-size: 60px;
    font-weight: bold;
    color: #ff4d6d;
    margin-top: 20px;
}

</style>

</head>

<body>

<h1 id="text"></h1>

<button id="yesBtn" onclick="showLove()">Yes ❤️</button>
<button id="noBtn" onmouseover="moveButton()">No 😢</button>

<audio id="bgMusic" autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

////////////////////////
// Typing Text Effect
////////////////////////

var message = "Niyh, do you love me? ❤️";
var i = 0;

function typing() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typing, 80);
    }
}

typing();

////////////////////////
// Moving + Shrinking NO Button
////////////////////////

var size = 20;

function moveButton() {

    var button = document.getElementById("noBtn");

    var x = Math.random() * (window.innerWidth - 100);
    var y = Math.random() * (window.innerHeight - 100);

    button.style.left = x + "px";
    button.style.top = y + "px";

    size -= 2;
    button.style.fontSize = size + "px";

    if (size < 5) {
        button.style.display = "none";
    }

}

////////////////////////
// Floating Hearts
////////////////////////

function createHeart() {

    var heart = document.createElement("div");

    heart.innerHTML = "❤️";

    heart.style.position = "fixed";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.top = "-10px";
    heart.style.fontSize = "24px";

    document.body.appendChild(heart);

    var move = setInterval(function() {

        var top = parseInt(heart.style.top);

        if (top > window.innerHeight) {
            clearInterval(move);
            heart.remove();
        }

        heart.style.top = top + 3 + "px";

    }, 30);

}

setInterval(createHeart, 500);

////////////////////////
// YES Button Result
////////////////////////

function showLove() {

document.body.innerHTML = `

<h1 class="loveText">I LOVE YOU NIYH ❤️</h1>

<img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif"
width="300">

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

`;

}

</script>

</body>
</html>
